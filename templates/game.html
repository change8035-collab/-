<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>BEAT ZONE</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --accent: #ff4488; }
* { margin:0; padding:0; box-sizing:border-box; }
html { background:#000; }
body { background:#FFFFFF; overflow:hidden; font-family:'Pretendard','Apple SD Gothic Neo','Segoe UI',sans-serif; }
canvas { display:block; position:fixed; top:0; left:0; z-index:3; }

/* 모달 공통 */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.3); z-index:99; backdrop-filter:blur(8px);
}
.modal-box {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#FFFFFF; border:1px solid #E5E8EB;
  border-radius:24px; padding:32px 36px;
  min-width:380px; max-width:460px; z-index:100; color:#191F28;
  box-shadow:0 8px 30px rgba(0,0,0,0.12), 0 20px 60px rgba(0,0,0,0.08);
}
.modal-box h2 { font-size:18px; font-weight:700; margin-bottom:24px; color:#191F28; }
.modal-box label { font-size:13px; color:#191F28; display:block; margin-bottom:8px; font-weight:500; }
.modal-box input[type=text], .modal-box input[type=file] {
  width:100%; padding:12px 16px; border-radius:12px;
  border:1px solid #E5E8EB; background:#F7F8FA;
  color:#191F28; font-size:14px; outline:none; transition:border .2s;
  font-family:inherit;
}
.modal-box input[type=text]:focus { border-color:var(--accent); }
.modal-box input[type=text]::placeholder { color:#4E5968; }

/* 설정 패널 */
#sp {
  display:none; position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#FFFFFF; border:1px solid #E5E8EB;
  border-radius:24px; padding:32px 36px;
  min-width:380px; z-index:100; color:#191F28;
  box-shadow:0 8px 30px rgba(0,0,0,0.12), 0 20px 60px rgba(0,0,0,0.08);
}
#sp h2 { font-size:18px; font-weight:700; margin-bottom:24px; color:#191F28; letter-spacing:0; }
#sp .row { display:flex; align-items:center; margin-bottom:18px; gap:14px; }
#sp label { width:80px; font-size:13px; color:#4E5968; flex-shrink:0; font-weight:500; }
#sp input[type=range] {
  flex:1; -webkit-appearance:none; height:4px;
  background:#E5E8EB; border-radius:2px; outline:none;
}
#sp input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:18px; height:18px;
  border-radius:50%; background:var(--accent); cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}
#sp .themes { display:flex; gap:8px; flex-wrap:wrap; }
#sp .th-btn {
  padding:8px 16px; border-radius:20px; font-size:12px; font-weight:600;
  border:1px solid #E5E8EB; background:transparent;
  color:#4E5968; cursor:pointer; transition:all .15s;
}
#sp .th-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
#sp .close-btn {
  margin-top:24px; width:100%; padding:12px; border-radius:14px;
  background:#F2F4F6; border:none;
  color:#4E5968; font-size:14px; font-weight:600; cursor:pointer;
  transition:background .15s;
}
#sp .close-btn:hover { background:#E5E8EB; color:#191F28; }
#sp .key-binds { display:flex; gap:10px; }
#sp .key-btn {
  width:52px; height:52px; border-radius:14px;
  border:2px solid #E5E8EB; background:#F8F9FA;
  color:#191F28; font-size:18px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .15s; user-select:none;
}
#sp .key-btn:hover { background:#E5E8EB; border-color:#B0B8C1; }
#sp .key-btn.waiting {
  border-color:var(--accent); color:var(--accent);
  background:rgba(49,130,246,0.06);
  animation:kpulse 0.8s infinite alternate;
}
@keyframes kpulse { from{box-shadow:0 0 4px rgba(0,0,0,0.1)} to{box-shadow:0 0 18px rgba(0,0,0,0.15)} }
#sp .key-label { font-size:11px; color:#4E5968; text-align:center; margin-top:6px; }

/* 곡 추가 모달 탭 */
.add-tab {
  flex:1; padding:11px; border-radius:12px; font-size:13px; font-weight:600;
  cursor:pointer; transition:all .15s; border:none;
}
/* 닉네임 모달 */
#nick-modal input { font-family:inherit; letter-spacing:1px; }

/* 버튼 공통 */
.btn-primary {
  padding:13px; border-radius:14px; font-size:15px; font-weight:700;
  background:var(--accent); border:none; color:#fff; cursor:pointer;
  transition:background .15s; font-family:inherit;
}
.btn-primary:hover { filter:brightness(0.85); }
.btn-primary:disabled { background:#E5E8EB; color:#B0B8C1; cursor:default; }
.btn-secondary {
  padding:13px; border-radius:14px; font-size:14px; font-weight:600;
  background:#F2F4F6; border:none; color:#4E5968; cursor:pointer;
  transition:background .15s; font-family:inherit;
}
.btn-secondary:hover { background:#E5E8EB; color:#191F28; }
</style>
</head>

<script src="https://www.youtube.com/iframe_api"></script>
<div id="yt-bg-player" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:2; overflow:hidden; pointer-events:none; display:none;"></div>
<script>
// ══════════════════════════════════════════════
//  BEAT ZONE  –  Rhythm Game (Flask Server)
// ══════════════════════════════════════════════
var ytBgPlayer=null, ytApiReady=false;
window.onYouTubeIframeAPIReady=function(){ ytApiReady=true; };

function showYTBackground(videoId){

  container.style.zIndex='2';

  // 영상 시작 대기 (배경용이므로 약간 어긋나도 OK)
  setTimeout(function(){
  },1500);
}
function hideYTBackground(){
  var container=document.getElementById('yt-bg-player');
  container.innerHTML='';
  container.style.display='none';
  container.style.zIndex='0';
  document.getElementById('c').style.zIndex='3';
  document.body.style.background='#FFFFFF';
}
// ── 닉네임 시스템 ───────────────────────────────
var playerId=localStorage.getItem('bz_player_id');
if(!playerId){
  playerId='p_'+Date.now()+'_'+Math.random().toString(36).substr(2,9);
  localStorage.setItem('bz_player_id',playerId);
}
var playerNick=localStorage.getItem('bz_nickname')||'';
var nickModalShown=false;

function showNickModal(callback){
  closeAllModals();
  nickModalShown=true;
  var modal=document.getElementById('nick-modal');
  var input=document.getElementById('nick-input');
  var btn=document.getElementById('nick-save-btn');
  modal.style.display='block';
  input.value=playerNick;
  input.focus();
  function save(){
    var v=input.value.trim();
    if(v.length<2){ input.style.borderColor='#ff4444'; return; }
    playerNick=v;
    localStorage.setItem('bz_nickname',v);
    // 서버에 닉네임 변경 알림 (기존 랭킹 닉네임도 갱신)
    fetch('/api/nickname',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({player_id:playerId,nickname:v})});
    modal.style.display='none';
    nickModalShown=false;
    btn.removeEventListener('click',save);
    input.removeEventListener('keydown',enter);
    if(callback) callback();
  }
  function enter(e){ if(e.key==='Enter') save(); }
  btn.addEventListener('click',save);
  input.addEventListener('keydown',enter);
}

// 첫 접속 시 닉네임 설정
if(!playerNick){
  window.addEventListener('load',function(){ showNickModal(); });
}

var c = document.getElementById('c');
var ctx = c.getContext('2d');
var W, H, DPR=window.devicePixelRatio||1;
function resize(){
  W=window.innerWidth; H=window.innerHeight;
  c.width=W*DPR; c.height=H*DPR;
  c.style.width=W+'px'; c.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize(); window.addEventListener('resize', resize);

// ── Audio ───────────────────────────────────────
var AC = new (window.AudioContext||window.webkitAudioContext)();
var bgmGain = AC.createGain(); bgmGain.gain.value=0.65; bgmGain.connect(AC.destination);
var sfxGain = AC.createGain(); sfxGain.gain.value=0.80; sfxGain.connect(AC.destination);
var masterGain = bgmGain; // BGM uses bgmGain

function tone(freq, type, dur, vol, t) {
  if(t < AC.currentTime) t = AC.currentTime;
  var o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(masterGain);
  o.type=type||'sine'; o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.start(t); o.stop(t+dur+0.05);
}

function noise(dur, vol, t, hpFreq) {
  if(t < AC.currentTime) t = AC.currentTime;
  var samples = Math.ceil(AC.sampleRate * dur);
  var buf=AC.createBuffer(1,samples,AC.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<samples;i++) d[i]=Math.random()*2-1;
  var src=AC.createBufferSource(); src.buffer=buf;
  var hp=AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=hpFreq||5000;
  var g=AC.createGain();
  src.connect(hp); hp.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(vol||0.2, t);
  g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  src.start(t); src.stop(t+dur+0.05);
}

function kick(t, vol) {
  if(t < AC.currentTime) t=AC.currentTime;
  var o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(masterGain);
  o.type='sine';
  o.frequency.setValueAtTime(150,t);
  o.frequency.exponentialRampToValueAtTime(40,t+0.15);
  g.gain.setValueAtTime(vol||0.5,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  o.start(t); o.stop(t+0.35);
}
function snare(t, vol) {
  noise(0.14, vol||0.28, t, 2000);
  tone(200,'square',0.07,(vol||0.28)*0.5,t);
}
function hihat(t, vol, open) {
  noise(open?0.12:0.04, vol||0.1, t, 8000);
}
// ── 풍부한 음악용 헬퍼 ────────────────────────
function pad(freqs, dur, vol, t) {
  // 여러 음을 동시에 - 패드/코드 사운드
  for(var i=0;i<freqs.length;i++){
    tone(freqs[i],'sine',dur,(vol||0.1)/freqs.length,t);
    // 약간 디튠된 레이어 (풍성한 사운드)
    tone(freqs[i]*1.003,'triangle',dur,(vol||0.1)/freqs.length*0.5,t);
  }
}
function arp(freq, type, dur, vol, t) {
  // 아르페지오용 짧은 음
  if(t<AC.currentTime) t=AC.currentTime;
  var o=AC.createOscillator(), g=AC.createGain();
  var flt=AC.createBiquadFilter();
  flt.type='lowpass'; flt.frequency.value=2000;
  o.connect(flt); flt.connect(g); g.connect(masterGain);
  o.type=type||'sawtooth'; o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.12,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur+0.05);
}
function heavyBass(freq, dur, vol, t) {
  // 무거운 디스토션 베이스
  if(t<AC.currentTime) t=AC.currentTime;
  var o=AC.createOscillator(), o2=AC.createOscillator();
  var g=AC.createGain();
  var dist=AC.createWaveShaper();
  var curve=new Float32Array(256);
  for(var i=0;i<256;i++){ var x=i*2/255-1; curve[i]=Math.tanh(x*3); }
  dist.curve=curve;
  o.connect(dist); o2.connect(dist); dist.connect(g); g.connect(masterGain);
  o.type='sawtooth'; o.frequency.value=freq;
  o2.type='square'; o2.frequency.value=freq*1.005;
  g.gain.setValueAtTime(vol||0.15,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur+0.05);
  o2.start(t); o2.stop(t+dur+0.05);
}
function sfxTone(freq,type,dur,vol,t){
  if(t<AC.currentTime)t=AC.currentTime;
  var o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(sfxGain);
  o.type=type||'sine';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.3,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur+0.05);
}
function hitSound(j) {
  // 효과음 비활성화
}

// ── Audio Playback (서버 MP3) ─────────────────
var bgmAudio = new Audio();
var bgmMediaSource = null;

function startBGM(song, startAC){
  stopBGM();
  if(song.audio_url){
    bgmAudio.src = song.audio_url;
    bgmAudio.volume = bgmGain.gain.value;
    bgmAudio.currentTime = 0;
    if(!bgmMediaSource){
      try{
        bgmMediaSource = AC.createMediaElementSource(bgmAudio);
        bgmMediaSource.connect(bgmGain);
      }catch(e){ /* 이미 연결됨 */ }
    }
    // songStartAC 시점까지 대기 후 재생 (노트와 싱크)
    var delay = startAC - AC.currentTime;
    if(delay > 0){
      setTimeout(function(){
        bgmAudio.play().catch(function(e){ console.warn('오디오 재생 실패',e); });
      }, delay * 1000);
    } else {
      bgmAudio.play().catch(function(e){ console.warn('오디오 재생 실패',e); });
    }
  }
}
function stopBGM(){
  bgmAudio.pause();
  bgmAudio.currentTime=0;
}
function _scheduleBGM_UNUSED(){
  if(!_bgmSong) return;
  var beat=60/_bgmSong.bpm;
  var step=beat*0.25; // 16th note grid
  var ahead=0.55;
  while(true){
    var t=_bgmSongStart+_bgmStep*step;
    if(t > AC.currentTime+ahead) break;
    if(_bgmStep > _bgmSong.bpm*4*3) break; // max 3 min
    var beatPos=_bgmStep*0.25;
    var s16=Math.round((beatPos%4)*4)%16;
    if(t >= AC.currentTime-0.01) _bgmSong.beat(t, beatPos, s16, beat);
    _bgmStep++;
  }
  _bgmTimer=setTimeout(_scheduleBGM, 200);
}

// ── Helper: build beatmap from pattern shorthand ──
// n(beat, lane) helper used inside IIFE
function buildMap(fn) {
  var bm=[];
  fn(function(b,l){ bm.push({b:b,l:l}); });
  bm.sort(function(a,x){return a.b-x.b;});
  return bm;
}

function hitY(){ return H-120; }
function leadTime(){ return (hitY()+30)/NOTE_PPS; }
function laneX(i){ return (W-LANE_W*4)/2 + LANE_W*i + LANE_W/2; }

// ── Ranking System (Flask API) ─────────────────
function getRankingOnline(s,diffName,callback){
  if(!s.id){ callback([]); return; }
  fetch('/api/rankings/'+s.id+'/'+diffName)
    .then(function(r){ return r.json(); })
    .then(function(ranks){ callback(ranks); })
    .catch(function(){ callback([]); });
}

function saveScore(s, sc, acc, grade, maxC, diffName){
  var entry={
    nick:playerNick||'???',
    score:sc, acc:acc, grade:grade, combo:maxC,
    date:Date.now()
  };
  // 서버에 저장
  if(s.id&&diffName){
    fetch('/api/rankings',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        song_id:s.id, difficulty:diffName,
        player_id:playerId, nickname:playerNick||'???',
        score:sc, accuracy:acc, grade:grade, max_combo:maxC
      })
    }).catch(function(e){ console.warn('랭킹 저장 실패',e); });
  }
  return [entry];
}

var state='menu'; // menu | difficulty | countdown | play | result

var song=null, songStartAC=0;
var countdownStart=0; // Date.now() when countdown began
var settingsOpen=false;
var pool=[], nextNI=0;
var score=0,combo=0,maxCombo=0;
var counts={PERFECT:0,GOOD:0,MISS:0};
var particles=[], hitFx=[];
var laneFlash=[0,0,0,0];
var judgeDisp={txt:'',color:'#fff',life:0};

// ── Start ──────────────────────────────────────
var baseNotePPS=320;
function startGame(){
  if(AC.state==='suspended') AC.resume();
  song = SONGS[selSong];
  var diff=DIFFICULTIES[selDifficulty];
  // 난이도에 맞춰 비트맵 재생성
  var dur=song.duration||90;
  if(song.analyzed_notes&&song.analyzed_notes.length>0){
    var fullBm=buildAnalyzedBeatmap(song.analyzed_notes, song.bpm);
    song.beatmap=filterBeatmapByDifficulty(fullBm, selDifficulty);
  } else {
    song.beatmap=generateBeatmap(song.bpm, dur, selDifficulty);
  }
  // BPM + 난이도에 따른 노트 속도
  // 기준: 120 BPM = baseNotePPS, BPM 높을수록 빠르게
  var bpmFactor = Math.max(0.7, Math.min(1.5, song.bpm / 120));
  NOTE_PPS = baseNotePPS * bpmFactor * diff.speedMul;
  song.currentDiff=diff.name;
  score=0;combo=0;maxCombo=0;
  counts={PERFECT:0,GOOD:0,MISS:0};
  pool=[];hitFx=[];particles=[];
  laneFlash=[0,0,0,0];nextNI=0;
  judgeDisp={txt:'',color:'#fff',life:0};
  var bps=song.bpm/60;
  for(var i=0;i<song.beatmap.length;i++)
    song.beatmap[i].hitT = song.beatmap[i].b/bps;
  // Start 3-second countdown first
  countdownStart = Date.now();
  state='countdown';
}
function launchPlay(){
  // Called after countdown ends
  // leadTime만큼 뒤로 밀어서 첫 노트가 맨 위(y=-30)에서 시작하게 함
  var lt = (hitY() + 30) / NOTE_PPS;
  songStartAC = AC.currentTime + lt + 0.1;
  startBGM(song, songStartAC);
  state='play';
}
var lastRanks=[], lastRankPos=-1, onlineRanksLoading=false;
/* declared above */
function endGame(){
  stopBGM();
  var tot=counts.PERFECT+counts.GOOD+counts.MISS;
  var acc=tot>0?Math.round((counts.PERFECT+counts.GOOD*0.5)/tot*100):0;
  var grade=acc>=95?'S':acc>=85?'A':acc>=70?'B':acc>=50?'C':'D';
  var diffName=song.currentDiff||'NORMAL';
  lastRanks=saveScore(song, score, acc, grade, maxCombo, diffName);
  lastRankPos=-1;
  for(var i=0;i<lastRanks.length;i++){
    if(lastRanks[i].score===score&&lastRanks[i].nick===playerNick){ lastRankPos=i; break; }
  }
  state='result';

  // 온라인 랭킹 비동기 로드
  onlineRanksLoading=true;
  getRankingOnline(song,diffName,function(ranks){
    lastRanks=ranks;
    onlineRanksLoading=false;
    // 내 위치 찾기
    lastRankPos=-1;
    for(var i=0;i<lastRanks.length;i++){
      if(lastRanks[i].score===score&&lastRanks[i].nick===playerNick){ lastRankPos=i; break; }
    }
  });
}

// ── Update ────────────────────────────────────
function update(){
  if(state==='countdown'){
    var elapsed=(Date.now()-countdownStart)/1000;
    if(elapsed>=3) launchPlay();
    return;
  }
  if(state!=='play') return;
  var st=AC.currentTime-songStartAC;
  var lt=leadTime(), hy=hitY();

  // Spawn notes
  while(nextNI<song.beatmap.length){
    var nm=song.beatmap[nextNI];
    if(st >= nm.hitT-lt){
      pool.push({
        lane:nm.l,
        hitT:nm.hitT,
        spawnAC: songStartAC+nm.hitT-lt,
        y:-30, hit:false, missed:false
      });
      nextNI++;
    } else break;
  }

  // Update notes
  for(var i=pool.length-1;i>=0;i--){
    var n=pool[i];
    n.y = -30 + (AC.currentTime - n.spawnAC)*NOTE_PPS;
    if(!n.hit&&!n.missed&&n.y>hy+JUDGE.GOOD){
      n.missed=true; counts.MISS++; combo=0;
      showJudge('MISS');
    }
    if(n.y>H+60) pool.splice(i,1);
  }

  // Song end
  if(nextNI>=song.beatmap.length && pool.length===0){
    var last=song.beatmap[song.beatmap.length-1];
    if(st>last.hitT+2) endGame();
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.91;p.vy*=0.91;p.life--;
    if(p.life<=0) particles.splice(i,1);
  }
  for(var i=hitFx.length-1;i>=0;i--){
    var h=hitFx[i]; h.y+=h.vy; h.life--;
    if(h.life<=0) hitFx.splice(i,1);
  }
  for(var i=0;i<4;i++) if(laneFlash[i]>0) laneFlash[i]--;
  if(judgeDisp.life>0) judgeDisp.life--;
}

// ── Judge ─────────────────────────────────────
function judge(lane){
  laneFlash[lane]=12;
  var hy=hitY(), best=-1, bestD=9999;
  for(var i=0;i<pool.length;i++){
    var n=pool[i];
    if(n.lane===lane&&!n.hit&&!n.missed){
      var d=Math.abs(n.y-hy);
      if(d<bestD){bestD=d;best=i;}
    }
  }
  // 해당 레인에 노트 없으면 → 패널티 없이 무시
  if(best===-1) return;
  // 판정 범위 밖이면 → 노트 유지, 무시
  if(bestD>JUDGE.GOOD) return;
  var j = bestD<=JUDGE.PERFECT?'PERFECT':'GOOD';
  pool[best].hit=true;
  showJudge(j,lane,pool[best].y);
  counts[j]++;
  combo++; if(combo>maxCombo)maxCombo=combo;
  score += j==='PERFECT'?(100+combo*2):(50+combo);
  boom(laneX(lane),hy,COLORS[lane],j==='PERFECT'?20:10);
}

function showJudge(j,lane,ny){
  var col=j==='PERFECT'?'#ffff44':j==='GOOD'?'#44ff88':'#ff4455';
  judgeDisp={txt:j,color:col,life:40};
  if(lane!==undefined)
    hitFx.push({x:laneX(lane),y:ny||hitY(),txt:j,color:col,life:40,vy:-1.5});
}

function boom(x,y,col,cnt){
  for(var i=0;i<cnt;i++){
    var a=Math.random()*6.28,s=2+Math.random()*5;
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:25+Math.random()*20,maxLife:45,size:2+Math.random()*4,color:col});
  }
}

// ── Draw helpers ──────────────────────────────
function rgba(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function rr(x,y,w,h,r){
  if(ctx.roundRect) ctx.roundRect(x,y,w,h,r);
  else ctx.rect(x,y,w,h);
}

// ── Draw Countdown ────────────────────────────
function drawCountdown(){
  if(song.youtube_id){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,W,H);
  } else {
    var grd=ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,song.bgTop); grd.addColorStop(1,song.bgBot);
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
  }
  var sx=(W-LANE_W*4)/2, hy=hitY();
  for(var i=0;i<4;i++){
    ctx.fillStyle=rgba(COLORS[i],0.04);
    ctx.fillRect(laneX(i)-LANE_W/2,0,LANE_W,H);
  }
  for(var i=0;i<=4;i++){
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(sx+LANE_W*i,0); ctx.lineTo(sx+LANE_W*i,H); ctx.stroke();
  }
  for(var i=0;i<4;i++){
    var x=laneX(i);
    ctx.strokeStyle=rgba(COLORS[i],0.4); ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(x,hy,34,0,6.28); ctx.stroke();
    ctx.fillStyle=rgba(COLORS[i],0.1);
    ctx.beginPath(); ctx.arc(x,hy,34,0,6.28); ctx.fill();
    ctx.font='bold 18px sans-serif'; ctx.fillStyle=rgba(COLORS[i],0.8);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(KEYS[i],x,hy); ctx.textBaseline='alphabetic';
  }
  // Dim overlay
  ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,W,H);
  // Countdown number
  var elapsed=(Date.now()-countdownStart)/1000;
  var remaining=3-elapsed;
  var num=Math.ceil(remaining);
  var scale=1+(remaining%1)*0.4; // pulse effect
  var alpha=0.4+(remaining%1)*0.6;
  ctx.save();
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.globalAlpha=alpha;
  ctx.font='bold '+(Math.round(120*scale))+'px sans-serif';
  ctx.fillStyle=song.color;
  ctx.shadowColor=song.color; ctx.shadowBlur=60;
  ctx.fillText(num>0?num:'GO!',W/2,H/2);
  ctx.shadowBlur=0; ctx.restore();
  // Song name
  ctx.textAlign='center'; ctx.font='bold 22px sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText(song.name,W/2,H/2+100);
}

  }

    var col=i%cols, row=Math.floor(i/cols);
    var s=SONGS[i];
    var cx=gridStartX+col*(cW+gap), cy=gridStartY+row*(cH+gap);
    var hov=hoverCard===i;
    menuCards.push({x:cx,y:cy,w:cW,h:cH,idx:i});

    ctx.fillStyle=hov?'#F2F4F6':'#FFFFFF';

    ctx.font='400 12px Pretendard,sans-serif'; ctx.fillStyle='#191F28';
    ctx.fillText(s.sub,cx+cW/2,cy+56);
    // 최고 점수
    var best=getBestScore(s);
    if(best){
      ctx.font='700 11px Pretendard,sans-serif'; ctx.fillStyle=accentColor();
      ctx.fillText('BEST '+best.score,cx+cW/2,cy+78);

      ctx.font='400 11px Pretendard,sans-serif'; ctx.fillStyle='#191F28';
      ctx.fillText('YouTube',cx+cW/2,cy+78);
    }

  }

  // + 곡 추가 버튼 (그리드 다음 위치)
  var addCol=SONGS.length%cols, addRow=Math.floor(SONGS.length/cols);
  var addX=gridStartX+addCol*(cW+gap), addY=gridStartY+addRow*(cH+gap);
  menuAddBtn={x:addX,y:addY,w:cW,h:cH};
  var addHov=hoverCard===-2;
  ctx.save();
  ctx.fillStyle=addHov?'#F2F4F6':'#FFFFFF';
  ctx.shadowColor='rgba(0,0,0,0.06)'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
  ctx.beginPath(); rr(addX,addY,cW,cH,16); ctx.fill();
  ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  if(addHov){
    ctx.strokeStyle=accentColor(); ctx.lineWidth=2;
  } else {
    ctx.strokeStyle='#D1D6DB'; ctx.lineWidth=1;
    ctx.setLineDash([6,4]);
  }
  ctx.beginPath(); rr(addX,addY,cW,cH,16); ctx.stroke();
  ctx.setLineDash([]);
  ctx.font='600 32px Pretendard,sans-serif'; ctx.fillStyle=addHov?accentColor():'#191F28';
  ctx.fillText('+',addX+cW/2,addY+50);
  ctx.font='500 12px Pretendard,sans-serif'; ctx.fillStyle='#191F28';
  ctx.fillText('곡 추가',addX+cW/2,addY+75);
  ctx.restore();

  var infoY=gridStartY+gridH+30;
  ctx.textAlign='center'; ctx.globalAlpha=1;
  ctx.font='500 16px Pretendard,sans-serif'; ctx.fillStyle='#191F28';
  ctx.fillText(KEYS.join(' · ')+' 키로 박자에 맞춰 노트를 처리하세요',W/2,infoY);
  ctx.font='500 14px Pretendard,sans-serif'; ctx.fillStyle='#191F28';
  ctx.fillText('곡 카드를 우클릭하면 수정할 수 있습니다',W/2,infoY+24);

  // 닉네임 표시 (top-left)
  ctx.textAlign='left';
  ctx.font='600 14px Pretendard,sans-serif'; ctx.fillStyle='#191F28';
  ctx.fillText(playerNick||'닉네임 설정',20,32);

  ctx.fillText('닉네임 변경 →',20,50);

  // Settings button (top-right of menu)
  drawBtn(W-100,16,84,36,'설정',BTN_MENU_SET_HOVER,'#8B95A1');
}

function getDiffBest(s,diffName){
  var key='beatzone_rank_'+s.name+'_'+diffName;

  }catch(e){}

}

// ── Draw Game ─────────────────────────────────
function drawGame(){
  if(song.youtube_id){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.fillRect(0,0,W,H);
  } else {
    var grd=ctx.createLinearGradient(0,0,0,H);
    grd.addColorStop(0,song.bgTop||'#1a0000'); grd.addColorStop(1,song.bgBot||'#080000');
    ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
  }

  var hy=hitY(), sx=(W-LANE_W*4)/2;

  // Lane shading
  for(var i=0;i<4;i++){
    ctx.fillStyle=rgba(COLORS[i],0.04);
    ctx.fillRect(laneX(i)-LANE_W/2,0,LANE_W,H);
  }
  // Lane lines
  for(var i=0;i<=4;i++){
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(sx+LANE_W*i,0); ctx.lineTo(sx+LANE_W*i,H); ctx.stroke();
  }
  // Lane flash
  for(var i=0;i<4;i++){
    if(laneFlash[i]>0){
      ctx.fillStyle=rgba(COLORS[i],laneFlash[i]/12*0.3);
      ctx.fillRect(sx+LANE_W*i,0,LANE_W,H);
    }
  }
  // Hit circles
  for(var i=0;i<4;i++){
    var x=laneX(i);
    ctx.strokeStyle=rgba(COLORS[i],0.5); ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(x,hy,34,0,6.28); ctx.stroke();
    ctx.fillStyle=rgba(COLORS[i],0.12);
    ctx.beginPath(); ctx.arc(x,hy,34,0,6.28); ctx.fill();
    ctx.font='bold 18px sans-serif'; ctx.fillStyle=rgba(COLORS[i],0.85);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(KEYS[i],x,hy); ctx.textBaseline='alphabetic';
  }
  // Hit line
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(sx,hy); ctx.lineTo(sx+LANE_W*4,hy); ctx.stroke();

  // Particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,6.28); ctx.fill();
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;

  // Notes
  for(var i=0;i<pool.length;i++){
    var n=pool[i]; if(n.hit) continue;
    var col=COLORS[n.lane], nx=laneX(n.lane), sz=26;
    ctx.save();
    ctx.globalAlpha=n.missed?0.3:1;
    ctx.shadowColor=col; ctx.shadowBlur=n.missed?0:20;
    ctx.fillStyle=col;
    ctx.beginPath(); rr(nx-sz,n.y-sz*0.4,sz*2,sz*0.8,8); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.28)';
    ctx.beginPath(); rr(nx-sz+3,n.y-sz*0.4+3,sz*2-6,sz*0.22,4); ctx.fill();
    ctx.shadowBlur=0; ctx.restore();
  }

  // HUD
  ctx.textAlign='center';
  ctx.font='bold 32px sans-serif'; ctx.fillStyle='#fff';
  ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=8;
  ctx.fillText(score,W/2,46); ctx.shadowBlur=0;
  if(combo>1){
    ctx.font='bold '+(20+Math.min(combo,30))+'px sans-serif';
    ctx.fillStyle='#ffff44'; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=14;
    ctx.fillText(combo+' COMBO',W/2,82); ctx.shadowBlur=0;
  }
  if(judgeDisp.life>0){
    ctx.globalAlpha=judgeDisp.life/40;
    ctx.font='bold 38px sans-serif';
    ctx.fillStyle=judgeDisp.color; ctx.shadowColor=judgeDisp.color; ctx.shadowBlur=18;
    ctx.fillText(judgeDisp.txt,W/2,H/2); ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
  for(var i=0;i<hitFx.length;i++){
    var h=hitFx[i];
    ctx.globalAlpha=h.life/40;
    ctx.font='bold 15px sans-serif'; ctx.fillStyle=h.color;
    ctx.fillText(h.txt,h.x,h.y);
  }
  ctx.globalAlpha=1;
  // Song info
  ctx.textAlign='left'; ctx.font='bold 16px sans-serif';
  ctx.fillStyle=rgba(song.color,0.9); ctx.fillText(song.name,16,26);
  ctx.font='13px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillText(song.sub,16,46);
  // 난이도 표시
  var curDiff=DIFFICULTIES[selDifficulty];
  ctx.font='bold 12px sans-serif'; ctx.fillStyle=curDiff.color;
  ctx.fillText('[ '+curDiff.name+' ]',16+ctx.measureText(song.sub).width+12,46);
  // Stats
  ctx.textAlign='right'; ctx.font='14px sans-serif';
  ctx.fillStyle='#ffff44'; ctx.fillText('✦ '+counts.PERFECT,W-16,26);
  ctx.fillStyle='#44ff88'; ctx.fillText('● '+counts.GOOD,W-16,46);
  ctx.fillStyle='#ff4455'; ctx.fillText('✕ '+counts.MISS,W-16,66);
  // Progress bar
  var last=song.beatmap[song.beatmap.length-1];
  var prog=Math.min(1,(AC.currentTime-songStartAC)/(last.hitT+2));
  ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(0,H-4,W,4);
  ctx.fillStyle=rgba(song.color,0.7); ctx.fillRect(0,H-4,W*prog,4);
  // Exit button (top-left, 곡명 아래)
  drawBtn(14,58,100,34,'← 나가기',BTN_EXIT_HOVER,'#ff4466');
  // Settings button (top-right, stats 아래)
  drawBtn(W-114,76,100,34,'⚙ 설정',BTN_SET_HOVER,'#aabbff');
}
var BTN_EXIT_HOVER=false, BTN_SET_HOVER=false, BTN_MENU_SET_HOVER=false, BTN_NICK_HOVER=false;
function drawBtn(x,y,w,h,label,hovered,accent){

}

// ── Draw Result ───────────────────────────────
function drawResult(){
  ctx.fillStyle='#FFFFFF'; ctx.fillRect(0,0,W,H);

  var tot=counts.PERFECT+counts.GOOD+counts.MISS;
  var acc=tot>0?Math.round((counts.PERFECT+counts.GOOD*0.5)/tot*100):0;
  var grade=acc>=95?'S':acc>=85?'A':acc>=70?'B':acc>=50?'C':'D';
  var gcol=acc>=90?'#F59F00':acc>=70?accentColor():'#FF6B6B';

  // 좌측: 결과
  var lx=W/2-180;
  ctx.textAlign='center';
  ctx.font='800 80px Pretendard,sans-serif'; ctx.fillStyle=gcol;
  ctx.fillText(grade,lx,H/2-100);

  ctx.font='700 32px Pretendard,sans-serif'; ctx.fillStyle='#191F28';
  ctx.fillText(score,lx,H/2-45);

  var curDiff=DIFFICULTIES[selDifficulty];
  ctx.font='700 14px Pretendard,sans-serif'; ctx.fillStyle=curDiff.color;
  ctx.fillText(curDiff.name,lx,H/2-18);
  ctx.font='400 16px Pretendard,sans-serif'; ctx.fillStyle='#8B95A1';

    ctx.beginPath(); ctx.moveTo(rx-140,H/2-110); ctx.lineTo(rx+140,H/2-110); ctx.stroke();

    for(var i=0;i<7;i++){

        }
        ctx.textAlign='left';
        ctx.font='700 14px Pretendard,sans-serif';
        ctx.fillStyle=i===0?'#F59F00':i===1?'#8B95A1':i===2?'#C27C45':'#B0B8C1';
        ctx.fillText((i+1)+'.',rx-130,ry+5);
        var gc2=r.acc>=90?'#F59F00':r.acc>=70?accentColor():'#FF6B6B';
        ctx.fillStyle=gc2; ctx.font='700 13px Pretendard,sans-serif';
        ctx.fillText(r.grade,rx-105,ry+5);
        ctx.fillStyle=isMe?accentColor():'#191F28';
        ctx.font=(isMe?'700 ':'500 ')+'13px Pretendard,sans-serif';
        ctx.fillText((r.nick||'???').substring(0,8),rx-78,ry+5);
        ctx.textAlign='right';
        ctx.fillStyle=isMe?'#191F28':'#4E5968';

function loop(){
  update();
  if(state==='menu') drawMenu();
  else if(state==='difficulty') drawDifficulty();
  else if(state==='countdown') drawCountdown();
  else if(state==='play') drawGame();

}

  if(state==='menu'){
    if(e.code==='ArrowLeft')  selSong=(selSong-1+SONGS.length)%SONGS.length;
    if(e.code==='ArrowRight') selSong=(selSong+1)%SONGS.length;
    if((e.code==='Enter'||e.code==='Space')&&SONGS.length>0){ state='difficulty'; diffHover=-1; loadDiffRanking(SONGS[selSong],DIFFICULTIES[0].name); }
    e.preventDefault(); return;
  }
  if(state==='difficulty'){
    if(e.code==='Escape') state='menu';
    if(e.code==='Digit1') { selDifficulty=0; startGame(); }
    if(e.code==='Digit2') { selDifficulty=1; startGame(); }
    e.preventDefault(); return;
  }
  if(state==='result'){
    if(e.code==='Enter'||e.code==='Space') state='menu'; return;
  }
  if(state==='play'){
    for(var i=0;i<CODES.length;i++) if(e.code===CODES[i]) judge(i);
    if(e.code==='Escape') endGame();
    e.preventDefault();
  }
});

function codeToLabel(code){
  // KeyA→A, Digit1→1, Space→SPACE, etc.
  if(code.startsWith('Key')) return code.slice(3);
  if(code.startsWith('Digit')) return code.slice(5);
  if(code==='Space') return 'SPACE';
  if(code==='ArrowUp') return '↑';
  if(code==='ArrowDown') return '↓';
  if(code==='ArrowLeft') return '←';
  if(code==='ArrowRight') return '→';
  if(code.startsWith('Semicolon')) return ';';
  if(code.startsWith('Quote')) return "'";
  if(code.startsWith('Comma')) return ',';
  if(code.startsWith('Period')) return '.';
  if(code.startsWith('Slash')) return '/';
  if(code.startsWith('Bracket')) return code==='BracketLeft'?'[':']';
  return code;
}

}

// 서버 분석 데이터 → 비트맵 변환
function buildAnalyzedBeatmap(notes, bpm){
  var bps=bpm/60;
  var bm=[];
  for(var i=0;i<notes.length;i++){
    var n=notes[i];
    var beat=n.t*bps; // 시간(초) → 비트
    bm.push({b:beat, l:n.l, e:n.e||0.5});
  }
  bm.sort(function(a,b){return a.b-b.b;});
  return bm;
}

// 난이도별 비트맵 필터링
function filterBeatmapByDifficulty(bm, diffIdx){
  var diff=DIFFICULTIES[diffIdx];
  var density=diff.densityMul;
  if(density>=1.2){
    // HARD: 전체 노트 사용
    return bm.slice();
  }
  // NORMAL: 에너지 낮은 노트 제거 + 간격 필터
  var filtered=[];
  var minGap=0.15; // 최소 간격 (비트)
  for(var i=0;i<bm.length;i++){
    var n=bm[i];
    // 에너지 기반 필터 (에너지 낮은 노트 확률적으로 제거)
    if(n.e!==undefined && n.e<0.3 && Math.random()>density) continue;
    // 너무 빽빽한 노트 제거
    if(filtered.length>0){
      var gap=n.b-filtered[filtered.length-1].b;
      if(gap<minGap) continue;
    }
    filtered.push({b:n.b, l:n.l});
  }
  return filtered;
}

function generateBeatmap(bpm, durationSec, diffIdx){
  diffIdx=diffIdx||1;
  var diff=DIFFICULTIES[diffIdx];
  var densityMul=diff.densityMul;
  var bm=[];
  var bps=bpm/60;
  var totalBeats=Math.floor(durationSec*bps);
  var beatsPerMeasure=4; // 4/4박자
  var totalMeasures=Math.floor(totalBeats/beatsPerMeasure);
  function addNote(b,l){ bm.push({b:b,l:l}); }

  // 시드 기반 랜덤 (같은 곡+난이도면 같은 패턴)
  var songId=(typeof selSong!=='undefined'&&SONGS[selSong]&&SONGS[selSong].id)?SONGS[selSong].id:0;
  var seed=bpm*1000+Math.floor(durationSec)+diffIdx*7919+songId*13337;
  function rng(){ seed=(seed*16807+0)%2147483647; return(seed&0x7fffffff)/2147483647; }

  // ── 곡 구조 자동 생성 (일반적인 팝/록 구조) ──
  // intro(4) - verse(8) - chorus(8) - verse(8) - chorus(8) - bridge(4) - chorus(8) - outro(4)
  // 곡 길이에 맞게 스케일링
  var structure=[];
  var template=[
    {type:'intro',  measures:4, intensity:0.3},
    {type:'verse',  measures:8, intensity:0.5},
    {type:'prechorus',measures:4, intensity:0.65},
    {type:'chorus', measures:8, intensity:0.85},
    {type:'verse',  measures:8, intensity:0.55},
    {type:'prechorus',measures:4, intensity:0.7},
    {type:'chorus', measures:8, intensity:0.9},
    {type:'bridge', measures:4, intensity:0.4},
    {type:'chorus', measures:8, intensity:1.0},
    {type:'outro',  measures:4, intensity:0.3}
  ];
  var templateTotal=0;
  for(var i=0;i<template.length;i++) templateTotal+=template[i].measures;
  var scale=totalMeasures/templateTotal;
  if(scale<0.5) scale=0.5;
  for(var i=0;i<template.length;i++){
    var m=Math.max(2,Math.round(template[i].measures*scale));
    structure.push({type:template[i].type, measures:m, intensity:template[i].intensity});
  }

  // ── 박자 패턴 (섹션 타입별) ──
  // 각 마디(4비트)에 대한 패턴 - intensity에 따라 밀도 조절
  // 킥 위치: 1, 3 / 스네어: 2, 4 → 이 리듬에 맞춤
  var kickPattern=[0, 2];      // 1박, 3박 (킥 = 왼쪽 레인 0,1)
  var snarePattern=[1, 3];     // 2박, 4박 (스네어 = 오른쪽 레인 2,3)
  var hihatPattern=[0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5]; // 8비트 하이햇

  var measureIdx=0;
  for(var si=0;si<structure.length;si++){
    var sec=structure[si];
    var intensity=sec.intensity*densityMul;

    // 섹션별 반복 패턴 생성 (2~4마디 단위로 반복 → 음악적)
    var patternLen=sec.type==='chorus'?2:sec.type==='verse'?4:2;
    var sectionPatterns=[];

    for(var p=0;p<patternLen;p++){
      var mp=[]; // 이 마디의 노트들
      // 킥 (1박, 3박) - 항상 존재
      for(var k=0;k<kickPattern.length;k++){
        var lane=rng()<0.5?0:1; // 왼쪽 두 레인
        mp.push({offset:kickPattern[k], lane:lane});
      }
      // 스네어 (2박, 4박) - intensity 0.4 이상
      if(intensity>=0.4){
        for(var s=0;s<snarePattern.length;s++){
          var lane=rng()<0.5?2:3; // 오른쪽 두 레인
          mp.push({offset:snarePattern[s], lane:lane});
        }
      }
      // 8비트 하이햇 필 (intensity에 비례해서 추가)
      if(intensity>=0.6){
        var hh=hihatPattern.slice();
        for(var h=0;h<hh.length;h++){
          // 킥/스네어와 겹치지 않는 위치만
          var isKick=kickPattern.indexOf(hh[h])>=0;
          var isSnare=snarePattern.indexOf(hh[h])>=0;
          if(!isKick&&!isSnare&&rng()<intensity*0.6){
            var lane=Math.floor(rng()*4);
            mp.push({offset:hh[h], lane:lane});
          }
        }
      }
      // 16비트 필 (chorus에서 고강도)
      if(intensity>=0.85){
        var sixteenths=[0.25,0.75,1.25,1.75,2.25,2.75,3.25,3.75];
        for(var x=0;x<sixteenths.length;x++){
          if(rng()<(intensity-0.7)*0.8){
            mp.push({offset:sixteenths[x], lane:Math.floor(rng()*4)});
          }
        }
      }
      // 동시타 (chorus 고강도)
      if(intensity>=0.8&&rng()<0.3){
        var dualBeat=rng()<0.5?0:2;
        mp.push({offset:dualBeat, lane:0});
        mp.push({offset:dualBeat, lane:3});
      }
      sectionPatterns.push(mp);
    }

    // 섹션의 마디들을 패턴 반복으로 채우기
    for(var m=0;m<sec.measures;m++){
      if(measureIdx>=totalMeasures) break;
      var beatStart=measureIdx*beatsPerMeasure;
      var pat=sectionPatterns[m%patternLen];

      // 마지막 마디에 필인 (다음 섹션 전환)
      var isFill=(m===sec.measures-1)&&sec.type!=='outro';

      for(var n=0;n<pat.length;n++){
        addNote(beatStart+pat[n].offset, pat[n].lane);
      }

      // 필인: 마지막 1비트에 연타
      if(isFill&&intensity>=0.5){
        var fillStart=3;
        var fillNotes=[0, 0.25, 0.5, 0.75];
        for(var f=0;f<fillNotes.length;f++){
          if(rng()<intensity){
            addNote(beatStart+fillStart+fillNotes[f], f);
          }
        }
      }

      measureIdx++;
    }
  }

  // intro 시작 전 2비트 비우기 (여유)
  var filtered=[];
  for(var i=0;i<bm.length;i++){
    if(bm[i].b>=2) filtered.push(bm[i]);
  }
  bm=filtered;

  // 중복 제거 (같은 비트+레인)
  var seen={};
  var unique=[];
  for(var i=0;i<bm.length;i++){
    var key=bm[i].b.toFixed(4)+'_'+bm[i].l;
    if(!seen[key]){ seen[key]=true; unique.push(bm[i]); }
  }
  unique.sort(function(a,b){return a.b-b.b;});
  return unique;
}

// ── 곡 추가 모달 ─────────────────────────────
var currentTab='youtube';
function openYTModal(){
  ytModalOpen=true;
  document.getElementById('yt-modal').style.display='block';
  document.getElementById('yt-url').value='';
  document.getElementById('yt-bpm').value='120';
  document.getElementById('yt-name').value='';
  document.getElementById('yt-status').style.display='none';
  document.getElementById('yt-add-btn').textContent='추가하기';
  document.getElementById('yt-add-btn').disabled=false;
  if(document.getElementById('upload-file')) document.getElementById('upload-file').value='';
  tapTimes=[];
  switchTab('youtube');
}
function closeYTModal(){
  ytModalOpen=false;
  document.getElementById('yt-modal').style.display='none';
}
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tab-youtube').style.display=tab==='youtube'?'block':'none';
  document.getElementById('tab-upload').style.display=tab==='upload'?'block':'none';
  var tabs=document.querySelectorAll('.add-tab');
  for(var i=0;i<tabs.length;i++){
    var t=tabs[i];
    if(t.dataset.tab===tab){
      t.style.background=accentColor();
      t.style.color='#fff';
    } else {
      t.style.background='transparent';
      t.style.color='#8B95A1';
    }
  }
}
// 탭 전환
document.querySelectorAll('.add-tab').forEach(function(btn){
  btn.addEventListener('click',function(){ switchTab(this.dataset.tab); });
});

// 탭 템포 (제거됨)

// 곡 추가 - 서버 API 사용
document.getElementById('yt-add-btn').addEventListener('click',function(){
  var bpm=parseInt(document.getElementById('yt-bpm').value)||120;
  var name=document.getElementById('yt-name').value.trim();
  bpm=Math.max(60,Math.min(300,bpm));

  var addBtn=document.getElementById('yt-add-btn');
  var statusEl=document.getElementById('yt-status');

  if(currentTab==='youtube'){
    // YouTube 다운로드 (서버에서 yt-dlp 사용)
    var url=document.getElementById('yt-url').value.trim();
    if(!url){ alert('YouTube URL을 입력해주세요.'); return; }

    addBtn.textContent='다운로드 중...';
    addBtn.disabled=true;
    statusEl.style.display='block';
    statusEl.style.background='rgba(100,200,255,0.1)';
    statusEl.style.color='#44aaff';
    statusEl.textContent='⏳ 서버에서 오디오를 다운로드하고 있습니다... (30초 정도 걸릴 수 있습니다)';

    fetch('/api/songs/youtube',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:url, bpm:bpm, name:name})
    })
    .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
    .then(function(res){
      if(!res.ok){
        statusEl.style.background='rgba(255,80,50,0.15)';
        statusEl.style.color='#ff6644';
        statusEl.textContent='⚠ '+(res.data.error||'다운로드 실패');
        addBtn.textContent='추가하기';
        addBtn.disabled=false;
        return;
      }
      addSongFromServer(res.data);
      addBtn.textContent='추가하기';
      addBtn.disabled=false;
      statusEl.style.display='none';
      closeYTModal();
    })
    .catch(function(e){
      statusEl.style.background='rgba(255,80,50,0.15)';
      statusEl.style.color='#ff6644';
      statusEl.textContent='⚠ 서버 연결 실패: '+e.message;
      addBtn.textContent='추가하기';
      addBtn.disabled=false;
    });

  } else {
    // 파일 업로드
    var fileInput=document.getElementById('upload-file');
    if(!fileInput.files.length){ alert('파일을 선택해주세요.'); return; }

    addBtn.textContent='업로드 중...';
    addBtn.disabled=true;
    statusEl.style.display='block';
    statusEl.style.background='rgba(100,200,255,0.1)';
    statusEl.style.color='#44aaff';
    statusEl.textContent='⏳ 파일을 업로드하고 있습니다...';

    // 파일에서 길이 감지
    var file=fileInput.files[0];
    var tempAudio=new Audio();
    tempAudio.src=URL.createObjectURL(file);
    tempAudio.addEventListener('loadedmetadata',function(){
      var duration=tempAudio.duration||90;
      URL.revokeObjectURL(tempAudio.src);

      var formData=new FormData();
      formData.append('file',file);
      formData.append('bpm',bpm);
      formData.append('name',name||file.name.replace(/\.[^.]+$/,''));
      formData.append('duration',duration);

      fetch('/api/songs/upload',{method:'POST',body:formData})
      .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
      .then(function(res){
        if(!res.ok){
          statusEl.style.background='rgba(255,80,50,0.15)';
          statusEl.style.color='#ff6644';
          statusEl.textContent='⚠ '+(res.data.error||'업로드 실패');
          addBtn.textContent='추가하기';
          addBtn.disabled=false;
          return;
        }
        addSongFromServer(res.data);
        addBtn.textContent='추가하기';
        addBtn.disabled=false;
        statusEl.style.display='none';
        closeYTModal();
      })
      .catch(function(e){
        statusEl.style.background='rgba(255,80,50,0.15)';
        statusEl.style.color='#ff6644';
        statusEl.textContent='⚠ 업로드 실패: '+e.message;
        addBtn.textContent='추가하기';
        addBtn.disabled=false;
      });
    });
    tempAudio.addEventListener('error',function(){
      // 길이 감지 실패 시 기본값
      URL.revokeObjectURL(tempAudio.src);
      var formData=new FormData();
      formData.append('file',file);
      formData.append('bpm',bpm);
      formData.append('name',name||file.name.replace(/\.[^.]+$/,''));
      formData.append('duration',90);
      fetch('/api/songs/upload',{method:'POST',body:formData})
      .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, data:d}; }); })
      .then(function(res){
        if(res.ok){ addSongFromServer(res.data); closeYTModal(); }
        addBtn.textContent='추가하기'; addBtn.disabled=false;
      });
    });
  }
});

// 서버 응답으로 곡 추가
function addSongFromServer(songData){
  var dur=songData.duration;
  var mins=Math.floor(dur/60);
  var secs=Math.round(dur%60);
  var durStr=mins+':'+(secs<10?'0':'')+secs;
  // 서버 분석 데이터가 있으면 사용, 없으면 랜덤 생성
  var beatmap;
  if(songData.analyzed_notes&&songData.analyzed_notes.length>0){
    beatmap = buildAnalyzedBeatmap(songData.analyzed_notes, songData.bpm);
  } else {
    beatmap = generateBeatmap(songData.bpm, dur);
  }
  SONGS.push({
    id:songData.id,
    name:songData.name,
    sub:songData.bpm+' BPM · '+durStr,
    bpm:songData.bpm,
    duration:dur,
    color:songData.color||'#ff4444',
    bgTop:'#1a0000', bgBot:'#080000',
    audio_url:songData.audio_url,
    youtube_id:songData.youtube_id||null,
    analyzed_notes:songData.analyzed_notes||null,
    beatmap:beatmap,
    beat:function(){}
  });
}

document.getElementById('yt-cancel-btn').addEventListener('click', closeYTModal);

// ── 페이지 로드 시 서버에서 곡 목록 불러오기 ────
function loadSongsFromServer(){
  fetch('/api/songs')
  .then(function(r){ return r.json(); })
  .then(function(songs){
    for(var i=0;i<songs.length;i++){
      addSongFromServer(songs[i]);
    }
  })
  .catch(function(e){ console.warn('곡 목록 로드 실패',e); });
}
loadSongsFromServer();

// ── startGame/launchPlay/endGame 수정 (YT 지원) ──
var _origStartGame=startGame;
startGame=function(){
  if(AC.state==='suspended') AC.resume();
  song = SONGS[selSong];
  score=0;combo=0;maxCombo=0;
  counts={PERFECT:0,GOOD:0,MISS:0};
  pool=[];hitFx=[];particles=[];
  laneFlash=[0,0,0,0];nextNI=0;
  judgeDisp={txt:'',color:'#fff',life:0};
  var bps=song.bpm/60;
  for(var i=0;i<song.beatmap.length;i++)
    song.beatmap[i].hitT = song.beatmap[i].b/bps;

  countdownStart=Date.now();
  state='countdown';
};

var _origLaunchPlay=launchPlay;
launchPlay=function(){
  var lt=(hitY()+30)/NOTE_PPS;
  songStartAC=AC.currentTime+lt+0.1;

  // 유튜브 곡이면 배경 영상 표시 (음소거, 시각 효과만)
  if(song.youtube_id) showYTBackground(song.youtube_id);

  // 오디오는 항상 다운로드 파일로 재생 (정확한 타이밍)
  startBGM(song, songStartAC);
  state='play';
};

var _origEndGame=endGame;
endGame=function(){
  stopBGM();
  hideYTBackground();
  var tot=counts.PERFECT+counts.GOOD+counts.MISS;
  var acc=tot>0?Math.round((counts.PERFECT+counts.GOOD*0.5)/tot*100):0;
  var grade=acc>=95?'S':acc>=85?'A':acc>=70?'B':acc>=50?'C':'D';
  var diffName=song.currentDiff||'NORMAL';
  lastRanks=saveScore(song, score, acc, grade, maxCombo, diffName);
  lastRankPos=-1;
  for(var i=0;i<lastRanks.length;i++){
    if(lastRanks[i].score===score&&lastRanks[i].nick===playerNick){ lastRankPos=i; break; }
  }
  state='result';

  // 온라인 랭킹 비동기 로드
  onlineRanksLoading=true;
  getRankingOnline(song,diffName,function(ranks){
    lastRanks=ranks;
    onlineRanksLoading=false;
    lastRankPos=-1;
    for(var i=0;i<lastRanks.length;i++){
      if(lastRanks[i].score===score&&lastRanks[i].nick===playerNick){ lastRankPos=i; break; }
    }
  });
};

loop();
</script>
